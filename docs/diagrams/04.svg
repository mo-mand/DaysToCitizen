<svg xmlns="http://www.w3.org/2000/svg" width="780" height="500" viewBox="0 0 780 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cyan4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="amber4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="blue4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="pink4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="slate4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arr4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arr-cyan4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
    <marker id="arr-amber4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arr-pink4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="500" fill="url(#bg4)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="70" x2="780" y2="70"/>
    <line x1="0" y1="250" x2="780" y2="250"/>
    <line x1="195" y1="0" x2="195" y2="500"/>
    <line x1="390" y1="0" x2="390" y2="500"/>
    <line x1="585" y1="0" x2="585" y2="500"/>
  </g>

  <!-- Title -->
  <text x="390" y="36" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#F1F5F9" text-anchor="middle">Internationalization Architecture</text>
  <text x="390" y="56" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">23 language files &#8212; RTL support &#8212; zero layout breakage</text>

  <!-- 23 Language Files -->
  <rect x="40" y="90" width="160" height="80" rx="10" fill="url(#slate4)" stroke="#475569" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="120" y="116" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#F1F5F9" text-anchor="middle">23 Language Files</text>
  <text x="120" y="134" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">en.ts  fr.ts  fa.ts  ar.ts  zh.ts</text>
  <text x="120" y="150" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">hi.ts  pa.ts  ur.ts  ko.ts</text>
  <text x="120" y="163" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">+ 14 more</text>

  <!-- Arrow: Lang files -> LanguageContext -->
  <line x1="200" y1="130" x2="268" y2="180" stroke="#06B6D4" stroke-width="2" marker-end="url(#arr-cyan4)"/>

  <!-- LanguageContext (center hub) -->
  <rect x="270" y="172" width="240" height="72" rx="12" fill="url(#cyan4)" filter="url(#shadow4)"/>
  <text x="390" y="196" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">LanguageContext</text>
  <text x="390" y="214" font-family="system-ui,sans-serif" font-size="10" fill="#CFFAFE" text-anchor="middle">&#123; t, lang, setLang &#125;</text>
  <text x="390" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#A5F3FC" text-anchor="middle">Sets data-dir on html element</text>

  <!-- Arrow: LanguageContext -> useLanguage hook -->
  <line x1="390" y1="244" x2="390" y2="278" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arr-amber4)"/>

  <!-- useLanguage hook -->
  <rect x="295" y="280" width="190" height="44" rx="10" fill="url(#amber4)" filter="url(#shadow4)"/>
  <text x="390" y="298" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">useLanguage() hook</text>
  <text x="390" y="314" font-family="system-ui,sans-serif" font-size="10" fill="#FDE68A" text-anchor="middle">consumed by every component</text>

  <!-- Component boxes -->
  <rect x="28" y="368" width="128" height="56" rx="8" fill="url(#blue4)" filter="url(#shadow4)"/>
  <text x="92" y="390" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Navbar</text>
  <text x="92" y="406" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.appName</text>
  <text x="92" y="418" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.tagline</text>

  <rect x="170" y="368" width="128" height="56" rx="8" fill="url(#blue4)" filter="url(#shadow4)"/>
  <text x="234" y="390" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">CountdownCard</text>
  <text x="234" y="406" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.daysNeeded</text>
  <text x="234" y="418" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.daysRemaining</text>

  <rect x="312" y="368" width="128" height="56" rx="8" fill="url(#blue4)" filter="url(#shadow4)"/>
  <text x="376" y="390" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">ManageStays</text>
  <text x="376" y="406" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.backToDashboard</text>
  <text x="376" y="418" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.saveLabel</text>

  <rect x="454" y="368" width="128" height="56" rx="8" fill="url(#blue4)" filter="url(#shadow4)"/>
  <text x="518" y="390" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">TripForm</text>
  <text x="518" y="406" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.entryDate</text>
  <text x="518" y="418" font-family="system-ui,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">t.exitDate</text>

  <!-- RTL box -->
  <rect x="614" y="368" width="138" height="56" rx="8" fill="url(#pink4)" filter="url(#shadow4)"/>
  <text x="683" y="388" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">RTL Support</text>
  <text x="683" y="404" font-family="system-ui,sans-serif" font-size="9" fill="#FCE7F3" text-anchor="middle">data-dir=rtl attr</text>
  <text x="683" y="418" font-family="system-ui,sans-serif" font-size="9" fill="#FCE7F3" text-anchor="middle">text-only &#183; layout safe</text>

  <!-- Arrows: hook to components -->
  <line x1="342" y1="324" x2="92" y2="366" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr4)"/>
  <line x1="362" y1="324" x2="234" y2="366" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr4)"/>
  <line x1="390" y1="324" x2="376" y2="366" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr4)"/>
  <line x1="418" y1="324" x2="518" y2="366" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- Arrow: LanguageContext to RTL (dashed pink) -->
  <line x1="510" y1="208" x2="648" y2="366" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-pink4)"/>
</svg>
