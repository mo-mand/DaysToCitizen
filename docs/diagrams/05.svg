<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="orange5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="green5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="amber5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="blue5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="purple5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="panelshadow5">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arr-green5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arr-amber5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arr-blue5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" fill="url(#bg5)" rx="16"/>

  <!-- Grid lines -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="70" x2="820" y2="70"/>
    <line x1="0" y1="210" x2="820" y2="210"/>
    <line x1="0" y1="350" x2="820" y2="350"/>
    <line x1="205" y1="0" x2="205" y2="420"/>
    <line x1="410" y1="0" x2="410" y2="420"/>
    <line x1="615" y1="0" x2="615" y2="420"/>
  </g>

  <!-- Title -->
  <text x="410" y="36" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#F1F5F9" text-anchor="middle">Data Storage Architecture</text>
  <text x="410" y="56" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Local-first design &#8212; full functionality before sign-up &#8212; seamless migration</text>

  <!-- Anonymous panel -->
  <rect x="24" y="82" width="240" height="280" rx="14" fill="#1E293B" stroke="#F97316" stroke-width="2" stroke-opacity="0.7" filter="url(#panelshadow5)"/>
  <rect x="24" y="82" width="240" height="38" rx="14" fill="url(#orange5)" opacity="0.9"/>
  <rect x="24" y="102" width="240" height="18" rx="0" fill="url(#orange5)" opacity="0.9"/>
  <text x="144" y="107" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Anonymous User</text>

  <!-- localStorage box -->
  <rect x="44" y="134" width="200" height="104" rx="10" fill="#0F172A" stroke="#F97316" stroke-width="1" stroke-opacity="0.4" filter="url(#shadow5)"/>
  <text x="144" y="156" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FB923C" text-anchor="middle">localStorage</text>
  <text x="144" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Stays stored in browser</text>
  <text x="144" y="190" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">No account needed</text>
  <text x="144" y="206" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Lost if cache cleared</text>
  <text x="144" y="220" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Zero login friction</text>

  <!-- Full features badge -->
  <rect x="54" y="252" width="180" height="30" rx="8" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="144" y="272" font-family="system-ui,sans-serif" font-size="10" fill="#FB923C" text-anchor="middle">Full features &#8212; no sign-in required</text>

  <!-- Anonymous panel bottom label -->
  <text x="144" y="340" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Anonymous session</text>

  <!-- Migration arrow (center) -->
  <rect x="280" y="175" width="120" height="62" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.7" filter="url(#shadow5)"/>
  <text x="340" y="196" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#FDE68A" text-anchor="middle">Sign-in</text>
  <text x="340" y="212" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">OTP verified</text>
  <text x="340" y="226" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">batch migration</text>

  <!-- Arrow: localStorage -> migration -->
  <line x1="264" y1="200" x2="278" y2="200" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arr-amber5)"/>
  <!-- Arrow: migration -> authenticated -->
  <line x1="400" y1="200" x2="416" y2="200" stroke="#10B981" stroke-width="2.5" marker-end="url(#arr-green5)"/>

  <!-- Authenticated panel -->
  <rect x="418" y="82" width="376" height="280" rx="14" fill="#1E293B" stroke="#10B981" stroke-width="2" stroke-opacity="0.7" filter="url(#panelshadow5)"/>
  <rect x="418" y="82" width="376" height="38" rx="14" fill="url(#green5)" opacity="0.9"/>
  <rect x="418" y="102" width="376" height="18" rx="0" fill="url(#green5)" opacity="0.9"/>
  <text x="606" y="107" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Authenticated User</text>

  <!-- JWT cookie box -->
  <rect x="434" y="134" width="160" height="90" rx="10" fill="#0F172A" stroke="#A855F7" stroke-width="1" stroke-opacity="0.5" filter="url(#shadow5)"/>
  <text x="514" y="156" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#C084FC" text-anchor="middle">JWT Cookie</text>
  <text x="514" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">httpOnly &#183; secure</text>
  <text x="514" y="190" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">90 day session</text>
  <text x="514" y="208" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">signed with jose</text>

  <!-- API routes box -->
  <rect x="434" y="238" width="160" height="104" rx="10" fill="#0F172A" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.5" filter="url(#shadow5)"/>
  <text x="514" y="258" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#60A5FA" text-anchor="middle">API Routes</text>
  <text x="514" y="276" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">GET /api/trips</text>
  <text x="514" y="291" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">POST /api/trips</text>
  <text x="514" y="306" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">DELETE /api/trips/:id</text>
  <text x="514" y="321" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">PATCH /api/trips/:id</text>

  <!-- db.json cylinder -->
  <rect x="614" y="158" width="158" height="154" rx="10" fill="#0F172A" stroke="#10B981" stroke-width="1" stroke-opacity="0.5" filter="url(#shadow5)"/>
  <ellipse cx="693" cy="158" rx="79" ry="14" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="1" stroke-opacity="0.6"/>
  <text x="693" y="190" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#34D399" text-anchor="middle">db.json</text>
  <text x="693" y="212" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">users[ ]</text>
  <text x="693" y="230" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">stays[ ]</text>
  <text x="693" y="248" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">otps[ ]</text>
  <text x="693" y="270" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">flat file &#183; single instance</text>
  <text x="693" y="284" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">no DB server needed</text>
  <text x="693" y="300" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">abstracted via db.ts</text>

  <!-- Arrow: JWT -> API -->
  <line x1="514" y1="224" x2="514" y2="236" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arr-blue5)"/>

  <!-- Arrow: API -> db.json (bidirectional) -->
  <line x1="596" y1="274" x2="612" y2="274" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr-blue5)"/>
  <line x1="612" y1="262" x2="596" y2="262" stroke="#10B981" stroke-width="2" marker-end="url(#arr-green5)"/>

  <!-- Bottom note -->
  <text x="410" y="392" font-family="system-ui,sans-serif" font-size="10" fill="#475569" text-anchor="middle">localStorage cleared on sign-in &#183; server data persists across devices &#183; migration is one-way</text>
</svg>
