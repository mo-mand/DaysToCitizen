<svg xmlns="http://www.w3.org/2000/svg" width="780" height="520" viewBox="0 0 780 520">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="blue3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="amber3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="purple3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="green3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arr-blue3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arr-purple3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A855F7"/>
    </marker>
    <marker id="arr-green3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="780" height="520" fill="url(#bg3)" rx="16"/>

  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="65" x2="780" y2="65"/>
    <line x1="0" y1="195" x2="780" y2="195"/>
    <line x1="0" y1="325" x2="780" y2="325"/>
    <line x1="0" y1="390" x2="780" y2="390"/>
    <line x1="130" y1="0" x2="130" y2="520"/>
    <line x1="390" y1="0" x2="390" y2="520"/>
    <line x1="650" y1="0" x2="650" y2="520"/>
  </g>

  <text x="390" y="36" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#F1F5F9" text-anchor="middle">OTP Authentication Flow</text>
  <text x="390" y="56" font-family="system-ui,sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Verified email-based login — no passwords, no OAuth dependency</text>

  <rect x="50" y="78" width="130" height="44" rx="10" fill="url(#blue3)" filter="url(#shadow3)"/>
  <text x="115" y="96" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">&#127760; Browser</text>
  <text x="115" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">User Interface</text>

  <rect x="325" y="78" width="130" height="44" rx="10" fill="url(#amber3)" filter="url(#shadow3)"/>
  <text x="390" y="96" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">&#9889; Next.js API</text>
  <text x="390" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#FDE68A" text-anchor="middle">Route Handlers</text>

  <rect x="600" y="78" width="130" height="44" rx="10" fill="url(#purple3)" filter="url(#shadow3)"/>
  <text x="665" y="96" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">&#9993; Resend</text>
  <text x="665" y="112" font-family="system-ui,sans-serif" font-size="10" fill="#E9D5FF" text-anchor="middle">Email Delivery</text>

  <line x1="115" y1="122" x2="115" y2="460" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.5"/>
  <line x1="390" y1="122" x2="390" y2="460" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.5"/>
  <line x1="665" y1="122" x2="665" y2="460" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.5"/>

  <rect x="88" y="152" width="24" height="24" rx="12" fill="#3B82F6"/>
  <text x="100" y="169" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">1</text>
  <line x1="115" y1="164" x2="375" y2="164" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr-blue3)"/>
  <rect x="148" y="148" width="195" height="20" rx="4" fill="#1E3A5F" fill-opacity="0.8"/>
  <text x="245" y="162" font-family="system-ui,sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">POST /api/auth/send-otp {email}</text>

  <rect x="363" y="200" width="24" height="24" rx="12" fill="#F59E0B"/>
  <text x="375" y="217" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">2</text>
  <line x1="390" y1="212" x2="650" y2="212" stroke="#A855F7" stroke-width="2" marker-end="url(#arr-purple3)"/>
  <rect x="415" y="196" width="200" height="20" rx="4" fill="#2D1B69" fill-opacity="0.8"/>
  <text x="515" y="210" font-family="system-ui,sans-serif" font-size="10" fill="#C4B5FD" text-anchor="middle">Forward: send 6-digit code via email</text>

  <rect x="638" y="248" width="24" height="24" rx="12" fill="#A855F7"/>
  <text x="650" y="265" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">3</text>
  <line x1="650" y1="260" x2="130" y2="260" stroke="#10B981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-green3)"/>
  <rect x="250" y="244" width="160" height="20" rx="4" fill="#064E3B" fill-opacity="0.8"/>
  <text x="330" y="258" font-family="system-ui,sans-serif" font-size="10" fill="#6EE7B7" text-anchor="middle">Code arrives in inbox</text>

  <rect x="88" y="300" width="24" height="24" rx="12" fill="#3B82F6"/>
  <text x="100" y="317" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">4</text>
  <line x1="115" y1="312" x2="375" y2="312" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr-blue3)"/>
  <rect x="148" y="296" width="195" height="20" rx="4" fill="#1E3A5F" fill-opacity="0.8"/>
  <text x="245" y="310" font-family="system-ui,sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">POST /api/auth/verify-otp {code}</text>

  <rect x="363" y="348" width="24" height="24" rx="12" fill="#10B981"/>
  <text x="375" y="365" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">5</text>
  <line x1="375" y1="360" x2="130" y2="360" stroke="#10B981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-green3)"/>
  <rect x="148" y="344" width="185" height="20" rx="4" fill="#064E3B" fill-opacity="0.8"/>
  <text x="240" y="358" font-family="system-ui,sans-serif" font-size="10" fill="#6EE7B7" text-anchor="middle">Set httpOnly JWT cookie (90 days)</text>

  <rect x="405" y="290" width="140" height="34" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.6"/>
  <text x="475" y="304" font-family="system-ui,sans-serif" font-size="9" fill="#FDE68A" text-anchor="middle">&#128190; db.otps[] saved</text>
  <text x="475" y="317" font-family="system-ui,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">code + expiry · consumed on use</text>

  <rect x="250" y="400" width="280" height="46" rx="10" fill="url(#green3)" filter="url(#shadow3)"/>
  <text x="390" y="421" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">&#10003; Authenticated</text>
  <text x="390" y="438" font-family="system-ui,sans-serif" font-size="10" fill="#D1FAE5" text-anchor="middle">OTP consumed · replay-proof · session active</text>
</svg>